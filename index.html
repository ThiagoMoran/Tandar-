<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Intranet TANDAR - Sistema de Gestión de Turnos</title>
    <style>
        /* Elimina todos los márgenes por defecto del navegador */
        * {
            box-sizing: border-box;
        }
        
        html, body {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background-color: #0b0c10; /* Color oscuro de fondo para que no parpadee en blanco al cargar */
            overflow: hidden; /* Evita barras de scroll duplicadas en la web */
        }

        /* Contenedor que obliga al iframe a ocupar el 100% exacto de la pantalla visual */
        .presentation-container {
            width: 100vw;
            height: 100vh;
            position: absolute;
            top: 0;
            left: 0;
        }

        iframe {
            width: 100%;
            height: 100%;
            border: none;
            display: block;
        }
    </style>
</head>
<body>

    <div class="presentation-container">
        <iframe 
    src="https://gamma.app/public/docs/Intranet-TANDAR-oe6cjt05vksu1ci" 
    allow="fullscreen"
    allowfullscreen="true" 
    mozallowfullscreen="true" 
    webkitallowfullscreen="true"
    style="position: absolute; top: 0; left: 0; width: 100%; height: 100%; border: none;">
</iframe>
    </div>

</body>
</html>
